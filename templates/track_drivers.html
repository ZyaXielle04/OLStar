<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OLStar | Track Drivers</title>

  <!-- Base & Page Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/track_drivers.css') }}">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Admin Panel</h2>
    </div>

    <nav class="nav">
      <a href="{{ url_for('pages.admin_dashboard') }}" class="nav-link">Dashboard</a>
      <a href="{{ url_for('pages.admin_users') }}" class="nav-link">Users</a>
      <a href="{{ url_for('pages.admin_transport_units') }}" class="nav-link">Transport Units</a>

      <!-- Operations (exposed) -->
      <a href="{{ url_for('pages.bookings_schedules') }}" class="nav-link">Schedules</a>
      <a href="{{ url_for('pages.bookings_track_drivers') }}" class="nav-link active">Track Drivers</a>
      
      <!-- Transactions Dropdown using details/summary (works without JS) -->
      <details class="nav-group" open>
          <summary>
              <span>Transactions</span>
          </summary>
          <div class="nav-submenu">
              <a href="{{ url_for('pages.gas_transactions') }}" class="nav-sublink">
                  <i class="fas fa-gas-pump"></i> Gas Transactions
              </a>
              <a href="{{ url_for('pages.rfid_transactions') }}" class="nav-sublink">
                  <i class="fas fa-id-card"></i> RFID Transactions
              </a>
              <a href="{{ url_for('pages.maintenance_transactions') }}" class="nav-sublink">
                  <i class="fas fa-tools"></i> Maintenance
              </a>
          </div>
        </details>

        <!-- General Ledger Dropdown -->
        <details class="nav-group" open>
            <summary>
                <span>General Ledger</span>
            </summary>
            <div class="nav-submenu">
                <a href="{{ url_for('pages.gl_overview') }}" class="nav-sublink">
                    <i class="fas fa-chart-pie" style="color:yellow;"></i> Overview
                </a>
                <a href="{{ url_for('pages.gl_admin_salary') }}" class="nav-sublink">
                    <i class="fas fa-user-tie" style="color:blue;"></i> Admin Salary
                </a>
                <a href="{{ url_for('pages.gl_drivers_salary') }}" class="nav-sublink">
                    <i class="fas fa-truck" style="color:green;"></i> Drivers Salary
                </a>
            </div>
        </details>

      <a href="{{ url_for('pages.admin_settings') }}" class="nav-link">Settings</a>
    </nav>

    <div class="sidebar-footer">
      <a href="{{ url_for('pages.admin_logout') }}" class="logout-btn">Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <header class="page-header">
      <button id="btnToggleSidebar" class="hamburger">☰</button>
      <h1>Track Drivers</h1>
      <p class="subtitle">Monitor your drivers in real time on the map below.</p>
      <button id="btnToggleTraffic" class="traffic-btn">Show Traffic</button>
    </header>

    <!-- Map Section -->
    <section class="map-section">
      <div id="map" style="width:100%; height:100%;"></div>
    </section>
  </main>

</div>

<!-- ================= SCRIPTS ================= -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- App Scripts -->
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/base.js') }}"></script>

<!-- Google Maps (WITH geometry library) -->
<script
  src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&libraries=geometry,marker&loading=async&callback=initMap&v=weekly"
  async
  defer
></script>

<!-- Page Logic -->
<script src="{{ url_for('static', filename='js/track_drivers.js') }}"></script>

</body>
</html>
