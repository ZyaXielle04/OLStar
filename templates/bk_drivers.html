<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OLStar | BK Drivers</title>

  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bk_drivers.css') }}">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Admin Panel</h2>
      </div>
      <nav class="nav">
        <a href="{{ url_for('pages.admin_dashboard') }}" class="nav-link">Dashboard</a>
        <a href="{{ url_for('pages.admin_users') }}" class="nav-link">Users</a>
        <a href="{{ url_for('pages.bk_drivers') }}" class="nav-link active">BK Drivers</a>
        <a href="{{ url_for('pages.admin_transport_units') }}" class="nav-link">Transport Units</a>

        <!-- Operations -->
        <a href="{{ url_for('pages.bookings_schedules') }}" class="nav-link">Schedules</a>
        <a href="{{ url_for('pages.bookings_track_drivers') }}" class="nav-link">Track Drivers</a>
        
        <!-- Expenses Dropdown -->
        <details class="nav-group" open>
          <summary><span>Expenses</span></summary>
          <div class="nav-submenu">
              <a href="{{ url_for('pages.gas_transactions') }}" class="nav-sublink"><i class="fas fa-gas-pump"></i> Gas Transactions</a>
              <a href="{{ url_for('pages.rfid_transactions') }}" class="nav-sublink"><i class="fas fa-id-card"></i> RFID Transactions</a>
              <a href="{{ url_for('pages.maintenance_transactions') }}" class="nav-sublink"><i class="fas fa-tools"></i> Maintenance</a>
          </div>
        </details>

        <!-- Accounting Dropdown -->
        <details class="nav-group" open>
            <summary><span>Accounting</span></summary>
            <div class="nav-submenu">
                <a href="{{ url_for('pages.gl_overview') }}" class="nav-sublink"><i class="fas fa-chart-pie"></i> General Ledger</a>
                <a href="{{ url_for('pages.gl_admin_salary') }}" class="nav-sublink"><i class="fas fa-user-tie"></i> Admin DTR</a>
                <a href="{{ url_for('pages.gl_drivers_salary') }}" class="nav-sublink"><i class="fas fa-truck"></i> Drivers DTR</a>
            </div>
        </details>

        <a href="{{ url_for('pages.admin_settings') }}" class="nav-link">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="{{ url_for('pages.admin_logout') }}" class="logout-btn">Logout</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <header class="page-header">
        <button id="btnToggleSidebar" class="hamburger">☰</button>
        <div class="page-header-text">
          <h1>BK Drivers</h1>
          <p class="subtitle">Manage BK drivers (driverType: bkdriver, role: driver) with van details</p>
        </div>
        <button id="btnOpenCreateModal" class="btn">Add BK Driver</button>
      </header>

      <!-- Drivers Grid -->
      <section id="driversGrid" class="cards users-grid">
        <!-- Driver cards injected here -->
      </section>
    </main>
  </div>

  <!-- Driver Modal (Create/Edit) -->
  <div id="driverModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 class="modal-title"></h2>
      <form id="driverForm">
        <!-- Personal Details -->
        <input type="text" name="firstName" placeholder="First Name" required />
        <input type="text" name="middleName" placeholder="Middle Name" />
        <input type="text" name="lastName" placeholder="Last Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="text" name="phone" placeholder="Phone Number" required />

        <!-- BK Van Details -->
        <div class="form-row">
          <input type="text" name="vanModel" placeholder="Van Model (e.g. Toyota HiAce)" required />
          <input type="text" name="plateNumber" placeholder="Plate Number" required />
          <input type="text" name="vanColor" placeholder="Van Color" required />
        </div>

        <button type="submit">Save Driver</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="{{ url_for('static', filename='js/base.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bk_drivers.js') }}"></script>
</body>
</html>
