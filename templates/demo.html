<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OLStar Demo | Track Drivers - Live Fleet Monitoring</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/demo.css') }}">
  
  <style>
    /* Additional styles for driver list clickability */
    .driver-item {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .driver-item:hover {
      background-color: rgba(66, 133, 244, 0.1);
      transform: translateX(4px);
    }
    
    .driver-item:active {
      background-color: rgba(66, 133, 244, 0.2);
    }
  </style>
</head>
<body>

<div class="demo-container">

  <!-- Simple Header -->
  <header class="demo-header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <h1>OLStar <span style="font-weight:400">| Driver Tracking</span></h1>
    </div>
    <div class="header-controls">
      <button id="btnToggleTraffic" class="control-btn">
        <i class="fas fa-map"></i> Show Traffic
      </button>
      <button id="btnResetView" class="control-btn reset">
        <i class="fas fa-crosshairs"></i> Reset View
      </button>
    </div>
  </header>

  <!-- Map Section -->
  <div class="map-container">
    <div id="map"></div>
  </div>

  <!-- Driver Status Panel (Collapsible) -->
  <div class="driver-panel" id="driverPanel">
    <div class="panel-header" id="panelHeader">
      <h3><i class="fas fa-truck-moving"></i> Active Drivers</h3>
      <span class="driver-count" id="driverCount">0</span>
      <i class="fas fa-chevron-up" id="panelToggleIcon"></i>
    </div>
    <div class="driver-list" id="driverList">
      <div style="padding: 1rem; text-align: center; color: #6c757d;">Loading drivers...</div>
    </div>
  </div>

</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
  <span id="toastMessage"></span>
</div>

<!-- ================= SCRIPTS ================= -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- App Scripts -->
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/base.js') }}"></script>

<!-- Google Maps (WITH geometry library) -->
<script
  src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&libraries=geometry,marker&loading=async&callback=initMap&v=weekly"
  async
  defer
></script>

<!-- Page Logic - track_drivers.js -->
<script src="{{ url_for('static', filename='js/track_drivers.js') }}"></script>

<!-- Driver Panel UI Logic -->
<script>
  // Panel collapse/expand functionality
  const driverPanel = document.getElementById('driverPanel');
  const panelHeader = document.getElementById('panelHeader');
  const panelToggleIcon = document.getElementById('panelToggleIcon');
  
  if (panelHeader) {
    panelHeader.addEventListener('click', () => {
      driverPanel.classList.toggle('expanded');
    });
  }
  
  // Reset view button functionality
  const resetBtn = document.getElementById('btnResetView');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      if (window.map) {
        window.map.setCenter({ lat: 14.5222733, lng: 120.999655 });
        window.map.setZoom(13);
        showToastMessage('View reset to garage location');
      }
    });
  }
  
  // Toast function for demo
  window.showToastMessage = function(message) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    if (toast && toastMessage) {
      toastMessage.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  };
  
  // Function to focus on a driver and open info window
  window.focusOnDriver = function(uid, driverName) {
    console.log("Focusing on driver:", uid, driverName);
    const marker = window.driverMarkers[uid];
    
    if (!marker) {
      console.error("Marker not found for uid:", uid);
      window.showToastMessage(`⚠️ Driver ${driverName} location not available`);
      return;
    }
    
    if (!window.map) {
      console.error("Map not found");
      return;
    }
    
    try {
      const position = marker.getPosition();
      if (!position) {
        console.error("Marker has no position");
        return;
      }
      
      // Center and zoom map
      window.map.setCenter(position);
      window.map.setZoom(17);
      
      // Close any open info window
      if (window.activeInfoWindow) {
        window.activeInfoWindow.close();
        window.activeInfoWindow = null;
      }
      
      // Get the marker's data
      const currentData = marker.userData;
      if (!currentData || !currentData.loc) {
        console.error("No location data for marker");
        return;
      }
      
      // Create and open info window
      window.reverseGeocode(currentData.loc.latitude, currentData.loc.longitude).then(address => {
        const infoContent = window.createInfoWindowContent(
          currentData.user, 
          currentData.loc, 
          currentData.speedKmh, 
          address
        );
        
        marker.infoWindow.setContent(infoContent);
        marker.infoWindow.open(window.map, marker);
        window.activeInfoWindow = marker.infoWindow;
        window.showToastMessage(`📍 Focused on ${driverName}`);
      }).catch(error => {
        console.error("Geocoding error:", error);
        // Fallback - open without address
        marker.infoWindow.open(window.map, marker);
        window.activeInfoWindow = marker.infoWindow;
        window.showToastMessage(`📍 Focused on ${driverName}`);
      });
      
    } catch (error) {
      console.error("Error focusing on driver:", error);
      window.showToastMessage(`⚠️ Error focusing on ${driverName}`);
    }
  };
  
  // Update driver panel with data from markers
  window.updateDriverPanelList = function() {
    const driverListEl = document.getElementById('driverList');
    const driverCountEl = document.getElementById('driverCount');
    
    if (!driverListEl) return;
    
    const drivers = [];
    for (const [uid, marker] of Object.entries(window.driverMarkers)) {
      if (marker && marker.userData) {
        const { user, speedKmh } = marker.userData;
        drivers.push({
          uid,
          name: `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Driver',
          speed: speedKmh || 0
        });
      }
    }
    
    driverCountEl.textContent = drivers.length;
    
    if (drivers.length === 0) {
      driverListEl.innerHTML = '<div style="padding: 1rem; text-align: center; color: #6c757d;">No active drivers</div>';
      return;
    }
    
    // Create the HTML
    driverListEl.innerHTML = drivers.map(driver => {
      let speedClass = 'speed-normal';
      let speedText = 'Normal';
      if (driver.speed > 60) {
        speedClass = 'speed-speeding';
        speedText = 'Speeding!';
      } else if (driver.speed > 30) {
        speedClass = 'speed-moderate';
        speedText = 'Moderate';
      }
      
      const initials = driver.name.split(' ').map(n => n[0]).join('').toUpperCase();
      
      return `
        <div class="driver-item" data-uid="${driver.uid}" data-driver-name="${driver.name}" style="cursor: pointer;">
          <div class="driver-avatar">${initials || 'D'}</div>
          <div class="driver-info">
            <div class="driver-name">${driver.name}</div>
            <div class="driver-speed">
              <span class="speed-badge ${speedClass}">
                ${driver.speed > 0 ? '🚗' : '🅿️'} ${driver.speed.toFixed(1)} km/h
              </span>
              <span style="margin-left: 6px; font-size: 0.65rem;">${speedText}</span>
            </div>
          </div>
          <i class="fas fa-location-dot" style="color: #ffb347;"></i>
        </div>
      `;
    }).join('');
    
    // Add click handlers - DIRECT event binding
    const driverItems = document.querySelectorAll('.driver-item');
    console.log(`Found ${driverItems.length} driver items to attach handlers to`);
    
    driverItems.forEach(item => {
      // Remove any existing click listeners by replacing with a clone
      const newItem = item.cloneNode(true);
      item.parentNode.replaceChild(newItem, item);
      
      // Add fresh click listener
      newItem.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const uid = this.getAttribute('data-uid');
        const driverName = this.getAttribute('data-driver-name');
        console.log("Driver item clicked:", uid, driverName);
        window.focusOnDriver(uid, driverName);
      });
    });
  };
  
  // Initial panel update and set interval
  setTimeout(() => {
    window.updateDriverPanelList();
    console.log("Initial driver panel update complete");
  }, 2000);
  
  // Update panel every 3 seconds
  setInterval(window.updateDriverPanelList, 3000);
  
  // Also update when visibility changes
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      setTimeout(window.updateDriverPanelList, 500);
    }
  });
  
  console.log("Driver panel UI initialized");
</script>

</body>
</html>
